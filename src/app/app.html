<div class="chart-container">
  <h2>Financial Data Overview</h2>

  <div class="controls">
  <div class="control-item">
    <label>Chart Type</label>
    <div class="button-group">
      <button 
        *ngFor="let type of chartTypes"
        [class.active]="chartType === type"
        (click)="chartType = type">
        {{ type | titlecase }}
      </button>
    </div>
  </div>

  <div class="control-item">
    <label>Show Points</label>
    <dx-check-box [(value)]="showPoints"></dx-check-box>
  </div>
</div>

  <dx-chart
    [dataSource]="financialData"
    title="Monthly Financial Performance">

    <dxi-series
      argumentField="month"
      valueField="revenue"
      name="Revenue"
      [type]="chartType"
      color="#4CAF50"
      [point]="{visible: showPoints}">
    </dxi-series>

    <dxi-series
      argumentField="month"
      valueField="expense"
      name="Expense"
      [type]="chartType"
      color="#F44336"
      [point]="{visible: showPoints}">
    </dxi-series>

    <dxo-argument-axis>
      <dxo-label [rotationAngle]="45" overlappingBehavior="rotate"></dxo-label>
    </dxo-argument-axis>

    <dxo-zoom-and-pan argumentAxis="both"></dxo-zoom-and-pan>

    <dxo-tooltip
      [enabled]="true"
      format="currency"
      [shared]="true">
    </dxo-tooltip>

    <dxo-legend
      verticalAlignment="bottom"
      horizontalAlignment="center">
    </dxo-legend>

  </dx-chart>
</div>
